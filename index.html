<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #ffffff;
  font-family: "Noto Serif SC", serif;
}

/* 容器占满屏幕 */
#container {
  position: relative;
  width: 100vw;
  height: 100vh;
  cursor: pointer;
}

/* 门 */
.panel {
  position: absolute;
  width: 50%;
  height: 100%;
  background: #ffffff;
  top: 0;
  z-index: 2;
  transition: transform 1.2s ease;
}

.left {
  left: 0;
  border-right: 1px solid #ddd;
}

.right {
  right: 0;
  border-left: 1px solid #ddd;
}

/* 打开动画 */
.open .left {
  transform: translateX(-100%);
}

.open .right {
  transform: translateX(100%);
}

/* 信纸（全屏） */
#content {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #f5ecd9; /* 米色 */
  color: #222;
  opacity: 0;
  transition: opacity 1.5s ease;
  
  /* 关键：像真实信件的排版 */
  padding: 40px 24px;
  box-sizing: border-box;
  line-height: 1.8;
  font-size: 18px;

  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* 文字区域（限制宽度更像信） */
#text {
  max-width: 600px;
  width: 100%;
}

/* 打开后显示 */
.open #content {
  opacity: 1;
}
</style>
</head>

<body>

<div id="container" onclick="openIt()">
  <div class="panel left"></div>
  <div class="panel right"></div>

  <div id="content">
    <div id="text">
      这是一封铺满整个屏幕的信。<br><br>
      你现在看到的，不是一个页面，<br>
      而是被展开的一整张纸。<br><br>
      内容可以很长，它会自然往下延伸。
    </div>
  </div>
</div>

<script>
let opened = false;

function openIt() {
  if (!opened) {
    document.getElementById("container").classList.add("open");
    opened = true;
  }
}
</script>

</body>
</html>

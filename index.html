<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>打开看看</title>

<style>
body {
  margin: 0;
  background: #ffffff; /* 背景白色 */
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: "Noto Serif SC", serif;
}

/* 容器 */
#container {
  position: relative;
  width: 80vw;
  max-width: 600px;
  height: 320px;
  cursor: pointer;
}

/* 左右“门” */
.panel {
  position: absolute;
  width: 50%;
  height: 100%;
  background: #ffffff; /* 门也是白色 */
  top: 0;
  transition: transform 1.2s ease;
  z-index: 2;
}

.left {
  left: 0;
  border-right: 1px solid #ddd;
}

.right {
  right: 0;
  border-left: 1px solid #ddd;
}

/* 打开动画 */
.open .left {
  transform: translateX(-100%);
}

.open .right {
  transform: translateX(100%);
}

/* 中间内容（信纸） */
#content {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #f5ecd9; /* 米色信纸 */
  color: #222; /* 黑色文字 */
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 20px;
  opacity: 0;
  transition: opacity 1.5s ease;
  padding: 30px;
  box-sizing: border-box;

  /* 关键：让它像一张纸 */
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  line-height: 1.6;
}

/* 打开后文字出现 */
.open #content {
  opacity: 1;
}
</style>
</head>

<body>

<div id="container" onclick="openIt()">
  <div class="panel left"></div>
  <div class="panel right"></div>

  <div id="content">
    这是一张被打开的信纸。<br><br>
    你看到的文字，原本是被隐藏的。
  </div>
</div>

<script>
let opened = false;

function openIt() {
  if (!opened) {
    document.getElementById("container").classList.add("open");
    opened = true;
  }
}
</script>

</body>
</html>
